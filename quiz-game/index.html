<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div id="start-screen" class="screen active">
      <h1>Quiz Time!</h1>
      <p>Test your knowledge with this fun Question</p>
      <button id="start-btn">  Start Quiz</button>


    </div>
    <div id="question-screen" class="screen ">
         <div id="question-screen" class="screen active">
      <h3 id="question-text">What is the Capital of France?</h3>
      <div class="status">
        <div >Question <span id="current-question">1</span> of <span id="total-question">6</span></div>
        <div>Score: <span id="score">0</span></div>        
      </div>
       <div class="options">
          <!--  -->
        </div>
      <div class="progress-bar">
        <div class="progress"></div>
      </div>
    </div>
    </div>
    <div class="screen" id="result-screen">
<h2>Quiz Results</h2>
<div class="remark">
  
</div>
<button id="restart-btn">Restart Quiz</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
